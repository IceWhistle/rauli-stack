repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: npm-test
        name: Run tests
        entry: bash -c 'cd electron-app && npm test'
        language: system
        pass_filenames: false
        files: \.(js|json)$

      - id: npm-audit
        name: Security audit
        entry: bash -c 'cd electron-app && npm audit --audit-level=high'
        language: system
        pass_filenames: false
        files: package.*\.json$
