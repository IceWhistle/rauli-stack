<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Shower Protocol v1.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0e17;--bg-card:#111827;--text:#e2e8f0;--text-dim:#94a3b8;
--accent:#00d4ff;--border:#1e293b;--radius:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.8;padding:0;margin:0}
.container{max-width:860px;margin:0 auto;padding:24px 20px 80px}
h1{font-size:2.2em;font-weight:800;text-align:center;margin:40px 0 10px;background:linear-gradient(135deg,#00d4ff,#06b6d4,#0ea5e9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
h2{color:#00d4ff;font-size:1.5em;margin:2em 0 0.8em;padding-bottom:8px;border-bottom:1px solid var(--border)}
h3{color:#7dd3fc;font-size:1.2em;margin:1.5em 0 0.5em}
h4{color:#34d399;font-size:1.05em;margin:1.2em 0 0.4em}
p{margin:0.6em 0;color:var(--text-dim)}
strong{color:var(--text)}
a{color:#00d4ff;text-decoration:none}
a:hover{text-decoration:underline}
ul,ol{padding-left:1.5em;margin:0.5em 0}
li{margin:0.3em 0;color:var(--text-dim)}
li strong{color:var(--text)}
table{width:100%;border-collapse:collapse;margin:1em 0;font-size:0.9em}
th,td{border:1px solid var(--border);padding:10px 14px;text-align:left}
th{background:#111827;color:#00d4ff;font-weight:600}
tr:nth-child(even){background:rgba(17,24,39,0.5)}
tr:nth-child(odd){background:rgba(10,14,23,0.5)}
blockquote{border-left:4px solid #00d4ff;margin:1em 0;padding:0.8em 1.2em;background:#111827;border-radius:0 8px 8px 0}
blockquote p{color:var(--text)}
code{background:#161b22;padding:2px 6px;border-radius:4px;font-size:0.9em;color:#7dd3fc}
pre{background:#161b22;padding:16px;border-radius:8px;overflow-x:auto}
hr{border:none;border-top:1px solid var(--border);margin:2em 0}
.hero-badge{display:inline-block;background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(6,182,212,0.1));border:1px solid rgba(0,212,255,0.3);padding:6px 18px;border-radius:20px;font-size:0.85em;font-weight:600;color:#00d4ff;letter-spacing:1px;text-transform:uppercase;text-align:center;margin:30px auto 0;display:block;width:fit-content}
.subtitle{text-align:center;color:var(--text-dim);font-size:1.1em;margin:10px 0 30px}
.back-link{display:inline-block;margin:20px 0;color:#00d4ff;font-size:0.9em}
.footer{text-align:center;padding:40px 0 20px;color:var(--text-dim);font-size:0.8em;border-top:1px solid var(--border);margin-top:40px}
@media(max-width:600px){
.container{padding:16px 14px 60px}
h1{font-size:1.6em}
h2{font-size:1.25em}
table{font-size:0.8em}
th,td{padding:6px 8px}
}
</style>
</head>
<body>
<div class="container">
<a href="/" class="back-link">← Back to Stack Protocol</a>
<div class="hero-badge">v1.0 — SHOWER OPTIMIZATION</div>
<div id="content">Loading...</div>
<div class="footer">
Built by Asis ⚗️ for Rauli · January 2026 · <a href="/">Back to Main Protocol</a>
</div>
</div>
<script>
fetch('shower-protocol-v1.md')
.then(r=>r.text())
.then(md=>{document.getElementById('content').innerHTML=marked.parse(md)})
.catch(e=>{document.getElementById('content').innerHTML='<p>Error: '+e+'</p>'});
</script>
</body>
</html>
